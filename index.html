<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Écran de chargement -->
    <div id="loader">
      <div class="loader-content">
        <div class="spinner"></div>
        <p class="loading-text">
          <span class="logo2">&lt;</span>Tom.Code/<span class="logo2"
            >&gt;</span
          >
        </p>
      </div>
    </div>

    <!-- navbar début -->
    <div id="navbar-container"></div>
    <!-- navbar fin -->

    <!-- titre start -->
    <div class="titre">
      <h2>Un Web Développeur Junior</h2>
      <h1>En quête d'une alternance</h1>
      <div class="separator1"></div>
    </div>
    <!-- titre end -->

    <!-- site gite start -->
    <div class="sitegite">
      <h1>Mon Premier Site Wordpress</h1>
      <img
        src="site-img.png"
        alt="Image du projet de site de gîte"
        class="sitegite-img"
      />
      <a
        href="https://gite-leshirondelles.fr"
        class="btn-sitegite"
        target="_blank"
        >Voir plus en détail</a
      >
    </div>
    <!-- site gite end -->

    <!-- contact screen start -->
    <div class="screen" id="contact-screen"></div>
    <!-- contact screen end -->
     
    <script src="script.js"></script>
  </body>
</html>
