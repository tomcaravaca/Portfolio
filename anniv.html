<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mes 18 ans</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --rose: #f43f72;
        --orange: #ff8c42;
        --yellow: #ffd166;
        --bg: #fffaf7;
        --bg2: #fff0e8;
        --card: #ffffff;
        --border: #f0e4dc;
        --text: #1a0a00;
        --muted: #a08070;
        --shadow: 0 2px 20px rgba(244, 63, 114, 0.1);
        --nav-bg: rgba(255, 250, 247, 0.88);
      }

      body.dark {
        --bg: #0d0d0d;
        --bg2: #1a1a1a;
        --card: #1a1a1a;
        --border: #2e2e2e;
        --text: #f0f0f0;
        --muted: #888;
        --shadow: 0 2px 20px rgba(244, 63, 114, 0.15);
        --nav-bg: rgba(13, 13, 13, 0.88);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
        transition:
          background 0.3s,
          color 0.3s;
      }

      .blob1,
      .blob2 {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
        filter: blur(80px);
      }
      .blob1 {
        width: 500px;
        height: 500px;
        top: -150px;
        right: -150px;
        background: rgba(244, 63, 114, 0.1);
      }
      .blob2 {
        width: 400px;
        height: 400px;
        bottom: -100px;
        left: -100px;
        background: rgba(255, 209, 102, 0.15);
      }

      .page {
        position: relative;
        z-index: 1;
        display: none !important;
      }
      .page.active {
        display: block !important;
      }
      #admin-login.active,
      #success-page.active {
        display: flex !important;
      }

      /* NAV */
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 28px;
        background: var(--nav-bg);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        transition:
          background 0.3s,
          border-color 0.3s;
      }
      .nav-brand {
        font-family: "Bebas Neue", sans-serif;
        font-size: 22px;
        letter-spacing: 3px;
        color: var(--rose);
        cursor: pointer;
      }
      .nav-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .nav-admin-btn {
        background: none;
        border: 1.5px solid var(--border);
        color: var(--muted);
        font-family: "DM Sans", sans-serif;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 8px 16px;
        border-radius: 20px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .nav-admin-btn:hover {
        border-color: var(--rose);
        color: var(--rose);
      }
      .theme-btn {
        background: none;
        border: 1.5px solid var(--border);
        color: var(--muted);
        width: 36px;
        height: 36px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        flex-shrink: 0;
      }
      .theme-btn:hover {
        border-color: var(--rose);
        transform: scale(1.1);
      }

      /* HERO */
      #hero {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 90px 20px 40px;
      }
      .confetti-deco {
        font-size: 32px;
        letter-spacing: 12px;
        margin-bottom: 20px;
        animation: fadeUp 0.6s ease both;
      }
      .age-label {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(130px, 26vw, 240px);
        line-height: 0.85;
        background: linear-gradient(
          135deg,
          var(--rose) 0%,
          var(--orange) 60%,
          var(--yellow) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: fadeUp 0.7s 0.05s ease both;
        filter: drop-shadow(0 4px 24px rgba(244, 63, 114, 0.18));
      }
      .hero-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(26px, 5vw, 52px);
        letter-spacing: 8px;
        color: var(--text);
        margin-top: -6px;
        animation: fadeUp 0.7s 0.15s ease both;
      }
      .hero-sub {
        font-size: 15px;
        font-weight: 300;
        font-style: italic;
        color: var(--muted);
        margin-top: 10px;
        letter-spacing: 1px;
        animation: fadeUp 0.7s 0.22s ease both;
      }
      .divider {
        width: 60px;
        height: 3px;
        border-radius: 2px;
        background: linear-gradient(90deg, var(--rose), var(--yellow));
        margin: 28px auto;
        animation: fadeUp 0.7s 0.3s ease both;
      }
      .hero-cards {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
        animation: fadeUp 0.7s 0.38s ease both;
      }
      .hero-card {
        background: var(--card);
        border: 1.5px solid var(--border);
        border-radius: 16px;
        padding: 18px 28px;
        text-align: center;
        box-shadow: var(--shadow);
        min-width: 130px;
      }
      .hero-card .hc-label {
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--muted);
      }
      .hero-card .hc-val {
        font-family: "Bebas Neue", sans-serif;
        font-size: 20px;
        letter-spacing: 2px;
        color: var(--rose);
        margin-top: 2px;
      }
      .btn-rsvp {
        margin-top: 36px;
        padding: 18px 52px;
        background: linear-gradient(135deg, var(--rose), var(--orange));
        color: #fff;
        font-family: "DM Sans", sans-serif;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 3px;
        text-transform: uppercase;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 6px 30px rgba(244, 63, 114, 0.3);
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        animation: fadeUp 0.7s 0.46s ease both;
      }
      .btn-rsvp:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 40px rgba(244, 63, 114, 0.38);
      }

      /* RSVP */
      #rsvp-page {
        min-height: 100vh;
        padding: 90px 20px 60px;
        max-width: 580px;
        margin: 0 auto;
      }
      .back-btn {
        background: none;
        border: none;
        color: var(--muted);
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        letter-spacing: 1px;
        cursor: pointer;
        padding: 0;
        margin-bottom: 32px;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: color 0.2s;
      }
      .back-btn:hover {
        color: var(--rose);
      }
      .form-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(44px, 9vw, 80px);
        line-height: 1;
        background: linear-gradient(135deg, var(--rose), var(--orange));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 6px;
      }
      .form-subtitle {
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 36px;
      }
      .form-group {
        margin-bottom: 22px;
      }
      .form-label {
        display: block;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 10px;
        font-weight: 500;
      }
      .form-group input[type="text"],
      .form-group textarea {
        width: 100%;
        background: var(--card);
        border: 1.5px solid var(--border);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        padding: 14px 16px;
        border-radius: 12px;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        outline: none;
      }
      .form-group input[type="text"]:focus,
      .form-group textarea:focus {
        border-color: var(--rose);
        box-shadow: 0 0 0 3px rgba(244, 63, 114, 0.1);
      }
      .form-group textarea {
        resize: vertical;
      }

      /* RADIO */
      .radio-group {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .radio-pill {
        flex: 1;
        min-width: 110px;
        background: var(--card);
        border: 1.5px solid var(--border);
        border-radius: 12px;
        padding: 13px 16px;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
        font-size: 14px;
        color: var(--muted);
        user-select: none;
      }
      .radio-pill:hover {
        border-color: var(--rose);
        color: var(--text);
      }
      .radio-pill.selected {
        border-color: var(--rose);
        color: var(--rose);
        background: rgba(244, 63, 114, 0.06);
        font-weight: 600;
      }

      /* CHECKBOXES */
      .check-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      @media (max-width: 400px) {
        .check-grid {
          grid-template-columns: 1fr;
        }
      }
      .check-item {
        background: var(--card);
        border: 1.5px solid var(--border);
        border-radius: 12px;
        padding: 13px 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 14px;
        color: var(--muted);
        user-select: none;
      }
      .check-item:hover {
        border-color: var(--orange);
        color: var(--text);
      }
      .check-item.checked {
        border-color: var(--orange);
        color: var(--text);
        background: rgba(255, 140, 66, 0.07);
      }
      .check-box-ui {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
        border: 1.5px solid var(--border);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        background: var(--bg);
        font-size: 12px;
        font-weight: bold;
      }
      .check-item.checked .check-box-ui {
        background: var(--orange);
        border-color: var(--orange);
        color: #fff;
      }

      .btn-submit {
        width: 100%;
        margin-top: 14px;
        padding: 18px;
        background: linear-gradient(135deg, var(--rose), var(--orange));
        color: #fff;
        font-family: "DM Sans", sans-serif;
        font-weight: 600;
        font-size: 15px;
        letter-spacing: 2px;
        text-transform: uppercase;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 6px 30px rgba(244, 63, 114, 0.25);
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 36px rgba(244, 63, 114, 0.35);
      }

      /* SUCCESS */
      #success-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 90px 20px 40px;
      }
      .success-emoji {
        font-size: 72px;
        margin-bottom: 20px;
        animation: pop 0.5s ease;
      }
      .success-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(44px, 9vw, 80px);
        background: linear-gradient(135deg, var(--rose), var(--orange));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .success-text {
        color: var(--muted);
        margin-top: 12px;
        font-size: 15px;
        max-width: 360px;
        line-height: 1.6;
      }

      /* ADMIN LOGIN */
      #admin-login {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 90px 20px 40px;
      }
      .login-box {
        background: var(--card);
        border: 1.5px solid var(--border);
        border-radius: 20px;
        padding: 40px;
        width: 100%;
        max-width: 360px;
        box-shadow: var(--shadow);
        margin: 0 auto;
      }
      .login-box h2 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 34px;
        margin-bottom: 24px;
        color: var(--rose);
      }

      /* ADMIN PAGE */
      #admin-page {
        padding: 90px 20px 40px;
        max-width: 1000px;
        margin: 0 auto;
      }
      .admin-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 16px;
        margin-bottom: 32px;
      }
      .admin-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 44px;
        background: linear-gradient(135deg, var(--rose), var(--orange));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 12px;
        margin-bottom: 28px;
      }
      .stat-card {
        background: var(--card);
        border: 1.5px solid var(--border);
        border-radius: 16px;
        padding: 18px;
        text-align: center;
        box-shadow: var(--shadow);
      }
      .stat-card .stat-num {
        font-family: "Bebas Neue", sans-serif;
        font-size: 40px;
        background: linear-gradient(135deg, var(--rose), var(--orange));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .stat-card .stat-label {
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--muted);
        margin-top: 2px;
      }
      .table-wrap {
        overflow-x: auto;
        background: var(--card);
        border: 1.5px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--shadow);
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead tr {
        border-bottom: 1.5px solid var(--border);
      }
      th {
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--muted);
        padding: 14px 16px;
        text-align: left;
      }
      td {
        padding: 14px 16px;
        font-size: 14px;
        border-bottom: 1px solid var(--bg2);
        vertical-align: middle;
      }
      tr:last-child td {
        border-bottom: none;
      }
      .badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1px;
      }
      .badge-yes {
        background: #edfbee;
        color: #2db63a;
      }
      .badge-no {
        background: #fdedef;
        color: #e8334a;
      }
      .badge-sam {
        background: #fff8e7;
        color: #d4960a;
      }
      .badge-dim {
        background: #fdeaf1;
        color: var(--rose);
      }
      .badge-both {
        background: #f0eeff;
        color: #7c5fd4;
      }
      .tag {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 6px;
        font-size: 11px;
        background: var(--bg2);
        color: var(--muted);
        margin: 2px;
      }
      .btn-clear {
        padding: 10px 20px;
        background: transparent;
        border: 1.5px solid var(--border);
        color: var(--muted);
        font-family: "DM Sans", sans-serif;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        border-radius: 20px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-clear:hover {
        border-color: #e8334a;
        color: #e8334a;
      }
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
        font-size: 14px;
      }
      .empty-state .big {
        font-size: 50px;
        display: block;
        margin-bottom: 16px;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes pop {
        0% {
          transform: scale(0);
        }
        70% {
          transform: scale(1.2);
        }
        100% {
          transform: scale(1);
        }
      }

      #confetti-container {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 999;
      }
      .confetto {
        position: absolute;
        border-radius: 2px;
        animation: fall linear forwards;
      }
      @keyframes fall {
        0% {
          transform: translateY(-20px) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(110vh) rotate(720deg);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="blob1"></div>
    <div class="blob2"></div>
    <div id="confetti-container"></div>

    <nav class="nav">
      <div class="nav-brand" onclick="showPage('hero')">mes 18 ans</div>
      <div class="nav-right">
        <button
          class="theme-btn"
          onclick="toggleTheme()"
          id="theme-btn"
          title="Thème"
        >
          🌙
        </button>
        <button class="nav-admin-btn" onclick="showPage('admin-login')">
          admin
        </button>
      </div>
    </nav>

    <!-- HERO -->
    <div id="hero" class="page active pt-nav">
      <div class="age-label">18</div>
      <div class="hero-title">ans</div>
      <div class="hero-sub">t'es invité à ma fête</div>
      <div class="divider"></div>
      <div class="hero-cards">
        <div class="hero-card">
          <div class="hc-label">Samedi</div>
          <div class="hc-val">XX/XX/2025</div>
        </div>
        <div class="hero-card">
          <div class="hc-label">Dimanche</div>
          <div class="hc-val">XX/XX/2025</div>
        </div>
        <div class="hero-card">
          <div class="hc-label">Lieu</div>
          <div class="hc-val">Chez moi</div>
        </div>
      </div>
      <button class="btn-rsvp" onclick="showPage('rsvp-page')">
        je réponds
      </button>
    </div>

    <!-- RSVP -->
    <div id="rsvp-page" class="page">
      <button class="back-btn" onclick="showPage('hero')">← retour</button>
      <div class="form-title">tu viens ?</div>
      <div class="form-subtitle">réponds en 30 secondes</div>

      <form id="rsvpForm" onsubmit="submitForm(event)">
        <div class="form-group">
          <label class="form-label">ton prénom</label>
          <input type="text" id="name" placeholder="Écris ton prénom..." />
        </div>
        <div class="form-group">
          <label class="form-label">tu seras là ?</label>
          <div class="radio-group" id="coming-group"></div>
        </div>
        <div id="details-section" style="display: none">
          <div class="form-group">
            <label class="form-label">quel(s) jour(s) ?</label>
            <div class="radio-group" id="day-group"></div>
          </div>
          <div class="form-group">
            <label class="form-label">tu peux ramener quelque chose ?</label>
            <div class="check-grid" id="stuff-group"></div>
          </div>
          <div class="form-group">
            <label class="form-label">un message (optionnel)</label>
            <textarea
              id="message"
              rows="3"
              placeholder="dis ce que tu veux..."
            ></textarea>
          </div>
        </div>
        <button type="submit" class="btn-submit">envoyer</button>
      </form>
    </div>

    <!-- SUCCESS -->
    <div id="success-page" class="page">
      <div class="success-emoji">🎉</div>
      <div class="success-title">reçu !</div>
      <p class="success-text">trop hâte de te voir</p>
    </div>

    <!-- ADMIN LOGIN -->
    <div id="admin-login" class="page">
      <div class="login-box">
        <h2>accès privé</h2>
        <div class="form-group">
          <label class="form-label">mot de passe</label>
          <input
            type="password"
            id="admin-pwd"
            placeholder="••••••••"
            onkeydown="if (event.key === 'Enter') checkAdmin();"
          />
        </div>
        <button class="btn-submit" onclick="checkAdmin()">entrer</button>
        <p
          id="pwd-error"
          style="
            color: #e8334a;
            font-size: 13px;
            margin-top: 12px;
            display: none;
          "
        >
          mauvais mot de passe
        </p>
      </div>
    </div>

    <!-- ADMIN PAGE -->
    <div id="admin-page" class="page">
      <div class="admin-header">
        <div class="admin-title">les réponses</div>
        <button class="btn-clear" onclick="clearAll()">tout effacer</button>
      </div>
      <div class="stats-grid" id="stats-grid"></div>
      <div class="table-wrap"><div id="table-container"></div></div>
    </div>

    <script>
      const ADMIN_PASSWORD = "18ans"; // ← Change ici !
      let selectedComing = null;
      let selectedDay = null;
      let selectedStuff = new Set();

      // ===== THEME =====
      function toggleTheme() {
        const isDark = document.body.classList.toggle("dark");
        document.getElementById("theme-btn").textContent = isDark ? "☀️" : "🌙";
        localStorage.setItem("theme", isDark ? "dark" : "light");
      }
      // Restore saved theme
      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
        document.addEventListener("DOMContentLoaded", () => {
          document.getElementById("theme-btn").textContent = "☀️";
        });
      }

      function buildForm() {
        // Coming
        const comingGroup = document.getElementById("coming-group");
        [
          { v: "oui", l: "oui, j'arrive !" },
          { v: "non", l: "non, désolé(e)" },
        ].forEach((opt) => {
          const el = document.createElement("div");
          el.className = "radio-pill";
          el.textContent = opt.l;
          el.addEventListener("click", () => {
            selectedComing = opt.v;
            comingGroup
              .querySelectorAll(".radio-pill")
              .forEach((p) => p.classList.remove("selected"));
            el.classList.add("selected");
            document.getElementById("details-section").style.display =
              opt.v === "oui" ? "block" : "none";
          });
          comingGroup.appendChild(el);
        });

        // Day
        const dayGroup = document.getElementById("day-group");
        [
          { v: "samedi", l: "samedi" },
          { v: "dimanche", l: "dimanche" },
          { v: "les deux", l: "les deux !" },
        ].forEach((opt) => {
          const el = document.createElement("div");
          el.className = "radio-pill";
          el.textContent = opt.l;
          el.addEventListener("click", () => {
            selectedDay = opt.v;
            dayGroup
              .querySelectorAll(".radio-pill")
              .forEach((p) => p.classList.remove("selected"));
            el.classList.add("selected");
          });
          dayGroup.appendChild(el);
        });

        // Stuff
        const stuffGroup = document.getElementById("stuff-group");
        [
          { v: "table", l: "une table" },
          { v: "matelas", l: "un matelas" },
          { v: "chaise", l: "des chaises" },
          { v: "sono", l: "une sono" },
          { v: "tente", l: "une tente" },
          { v: "boissons", l: "des boissons" },
          { v: "nourriture", l: "de la nourriture" },
          { v: "jeux", l: "des jeux" },
        ].forEach((opt) => {
          const el = document.createElement("div");
          el.className = "check-item";
          el.innerHTML = `<span class="check-box-ui"></span><span>${opt.l}</span>`;
          el.addEventListener("click", () => {
            if (selectedStuff.has(opt.v)) {
              selectedStuff.delete(opt.v);
              el.classList.remove("checked");
              el.querySelector(".check-box-ui").textContent = "";
            } else {
              selectedStuff.add(opt.v);
              el.classList.add("checked");
              el.querySelector(".check-box-ui").textContent = "✓";
            }
          });
          stuffGroup.appendChild(el);
        });
      }

      function submitForm(e) {
        e.preventDefault();
        const name = document.getElementById("name").value.trim();
        if (!name) {
          alert("Entre ton prénom !");
          return;
        }
        if (!selectedComing) {
          alert("Dis-moi si tu viens !");
          return;
        }
        if (selectedComing === "oui" && !selectedDay) {
          alert("Quel(s) jour(s) ?");
          return;
        }
        const entry = {
          name,
          coming: selectedComing,
          day: selectedDay || "-",
          stuff: [...selectedStuff],
          message: document.getElementById("message").value.trim(),
          date: new Date().toLocaleString("fr-FR"),
        };
        const saved = JSON.parse(localStorage.getItem("rsvp_entries") || "[]");
        saved.push(entry);
        localStorage.setItem("rsvp_entries", JSON.stringify(saved));
        launchConfetti();
        showPage("success-page");
      }

      function showPage(id) {
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        window.scrollTo(0, 0);
      }

      function checkAdmin() {
        if (document.getElementById("admin-pwd").value === ADMIN_PASSWORD) {
          document.getElementById("pwd-error").style.display = "none";
          renderAdmin();
          showPage("admin-page");
        } else {
          document.getElementById("pwd-error").style.display = "block";
        }
      }

      function renderAdmin() {
        const entries = JSON.parse(
          localStorage.getItem("rsvp_entries") || "[]",
        );
        const statsEl = document.getElementById("stats-grid");
        const tableEl = document.getElementById("table-container");
        const total = entries.length;
        const oui = entries.filter((e) => e.coming === "oui").length;
        const non = entries.filter((e) => e.coming === "non").length;
        const sam = entries.filter(
          (e) => e.day === "samedi" || e.day === "les deux",
        ).length;
        const dim = entries.filter(
          (e) => e.day === "dimanche" || e.day === "les deux",
        ).length;
        const stuffCount = {};
        entries.forEach((e) =>
          e.stuff.forEach((s) => {
            stuffCount[s] = (stuffCount[s] || 0) + 1;
          }),
        );

        statsEl.innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Réponses</div></div>
    <div class="stat-card"><div class="stat-num">${oui}</div><div class="stat-label">Présents</div></div>
    <div class="stat-card"><div class="stat-num">${non}</div><div class="stat-label">Absents</div></div>
    <div class="stat-card"><div class="stat-num">${sam}</div><div class="stat-label">Samedi</div></div>
    <div class="stat-card"><div class="stat-num">${dim}</div><div class="stat-label">Dimanche</div></div>
    ${Object.entries(stuffCount)
      .map(
        ([k, v]) =>
          `<div class="stat-card"><div class="stat-num">${v}</div><div class="stat-label">${k}</div></div>`,
      )
      .join("")}
  `;

        if (!entries.length) {
          tableEl.innerHTML =
            '<div class="empty-state"><span class="big">—</span>personne n\'a encore répondu</div>';
          return;
        }
        const dayBadge = (d) => {
          if (d === "samedi")
            return '<span class="badge badge-sam">Samedi</span>';
          if (d === "dimanche")
            return '<span class="badge badge-dim">Dimanche</span>';
          if (d === "les deux")
            return '<span class="badge badge-both">Les deux</span>';
          return "-";
        };
        tableEl.innerHTML = `
    <table>
      <thead><tr><th>Prénom</th><th>Vient ?</th><th>Jour(s)</th><th>Apporte</th><th>Message</th><th>Date</th></tr></thead>
      <tbody>
        ${entries
          .map(
            (e) => `<tr>
          <td><strong>${e.name}</strong></td>
          <td>${e.coming === "oui" ? '<span class="badge badge-yes">présent</span>' : '<span class="badge badge-no">absent</span>'}</td>
          <td>${dayBadge(e.day)}</td>
          <td>${e.stuff.length ? e.stuff.map((s) => `<span class="tag">${s}</span>`).join("") : '<span style="color:var(--muted)">Rien</span>'}</td>
          <td style="color:var(--muted);font-size:13px;max-width:200px;">${e.message || "-"}</td>
          <td style="color:var(--muted);font-size:12px;white-space:nowrap;">${e.date}</td>
        </tr>`,
          )
          .join("")}
      </tbody>
    </table>
  `;
      }

      function clearAll() {
        if (confirm("Supprimer toutes les réponses ?")) {
          localStorage.removeItem("rsvp_entries");
          renderAdmin();
        }
      }

      function launchConfetti() {
        const colors = [
          "#F43F72",
          "#FF8C42",
          "#FFD166",
          "#6DDC6D",
          "#60A5FA",
          "#a78bfa",
        ];
        const container = document.getElementById("confetti-container");
        for (let i = 0; i < 100; i++) {
          const el = document.createElement("div");
          el.className = "confetto";
          el.style.cssText = `left:${Math.random() * 100}vw;top:-10px;background:${colors[Math.floor(Math.random() * colors.length)]};animation-duration:${1.5 + Math.random() * 2.5}s;animation-delay:${Math.random()}s;width:${6 + Math.random() * 8}px;height:${6 + Math.random() * 8}px;border-radius:${Math.random() > 0.5 ? "50%" : "2px"};`;
          container.appendChild(el);
          setTimeout(() => el.remove(), 5000);
        }
      }

      buildForm();
    </script>
  </body>
</html>
